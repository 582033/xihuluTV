<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>西葫芦TV - 系统管理后台</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.47/vue.global.prod.min.js"></script>
    <style>
        .nav-link.active {
            background: #e9ecef;
            border-left: 4px solid #0d6efd;
            font-weight: bold;
        }
        .sidebar { z-index: 100; box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1); }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 14px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .toast-success { color: #67c23a; }
        .toast-error { color: #f56c6c; }
        .toast-info { color: #909399; }
        .toast-warning { color: #e6a23c; }
        .site-input { background: transparent !important; border: 1px solid transparent !important; transition: 0.2s; }
        .site-input:hover { border-color: #dee2e6 !important; background: #f8f9fa !important; }
        .site-input:focus { border-color: #0d6efd !important; background: #fff !important; outline: none; }
        .unsaved-indicator { width: 8px; height: 8px; border-radius: 50%; background: #e6a23c; display: inline-block; margin-right: 8px; }
    </style>
</head>

<body class="bg-light">

    <div id="app">
        <!-- Toast 通知 -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- 登录界面 -->
        <div v-if="!isLoggedIn" class="container mt-5">
            <div class="card mx-auto shadow-sm border-0" style="max-width: 400px; border-radius:12px;">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-tv fa-3x text-primary mb-3"></i>
                        <h4 class="card-title fw-bold">管理后台</h4>
                    </div>
                    <div class="mb-3">
                        <input type="password" v-model="password" @keyup.enter="login"
                            class="form-control form-control-lg bg-light border-0" placeholder="请输入密码">
                    </div>
                    <button @click="login" class="btn btn-primary btn-lg w-100 fw-bold">登录</button>
                </div>
            </div>
        </div>

        <!-- 成功进入控制台 -->
        <div v-else class="container-fluid p-0 d-flex flex-column" style="height: 100vh;">
            <!-- 顶栏 -->
            <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
                <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6" href="#"><i
                        class="fas fa-film text-warning"></i> 管理后台</a>
                <div class="navbar-nav flex-row align-items-center">
                    <div v-if="hasUnsavedChanges" class="nav-link px-3" style="color: #e6a23c;">
                        <span class="unsaved-indicator"></span>未保存
                    </div>
                    <div class="nav-item text-nowrap">
                        <a class="nav-link px-3" href="#" @click.prevent="handleLogout">安全退出 <i
                                class="fas fa-sign-out-alt"></i></a>
                    </div>
                </div>
            </header>

            <div class="row flex-grow-1 m-0">
                <!-- 侧边栏 -->
                <nav id="sidebarMenu"
                    class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm position-fixed h-100 p-0">
                    <div class="position-sticky pt-3">
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link text-dark" :class="{active: activeMenu==='sys'}"
                                    @click="activeMenu='sys'" href="#" style="padding:15px 25px;"><i
                                        class="fas fa-cog me-2 text-success"></i> TMDB 设置</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-dark" :class="{active: activeMenu==='source'}"
                                    @click="activeMenu='source'" href="#" style="padding:15px 25px;"><i
                                        class="fas fa-server me-2 text-primary"></i> 资源设置</a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <!-- 右侧视窗 -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" style="background:#f4f6f9; min-height:100%;">

                    <!-- 1. 系统设置 -->
                    <div v-if="activeMenu==='sys'">
                        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4">
                            <h3 class="fw-bold">TMDB 设置</h3>
                            <button class="btn btn-success px-4" @click="saveConfig" :disabled="!hasUnsavedConfigChanges"><i class="fas fa-save me-1"></i>
                                保存</button>
                        </div>
                        <div class="card shadow-sm border-0 rounded-3">
                            <div class="card-body p-4">
                                <div class="row align-items-center mb-4 pb-4 border-bottom">
                                    <div class="col-md-3">
                                        <h6 class="fw-bold mb-0">ProxyURL</h6>
                                    </div>
                                    <div class="col-md-9">
                                        <input type="text" v-model="config.tmdb_proxy"
                                            class="form-control form-control-lg bg-light"
                                            placeholder="例如：https://api.tmdb.org">
                                    </div>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-3">
                                        <h6 class="fw-bold mb-0">ApiKey</h6>
                                    </div>
                                    <div class="col-md-9">
                                        <input type="password" v-model="config.tmdb_api_key"
                                            class="form-control form-control-lg bg-light">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 影视采集源 -->
                    <div v-else-if="activeMenu==='source'">
                        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4">
                            <h3 class="fw-bold">资源设置</h3>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-primary shadow-sm rounded-pill px-3"
                                    @click="addSite"><i class="fas fa-plus"></i> 新增</button>
                                <button class="btn btn-primary shadow-sm rounded-pill px-4" @click="saveSites" :disabled="!hasUnsavedChanges"><i
                                        class="fas fa-save"></i> 保存</button>
                            </div>
                        </div>
                        <div class="card shadow-sm border-0">
                            <table class="table table-hover align-middle mb-0" style="font-size:14px;">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">状态</th>
                                        <th>Key</th>
                                        <th>名称</th>
                                        <th>接口地址</th>
                                        <th class="text-end pe-4">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(site, index) in sites" :key="index">
                                        <td class="ps-4">
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox" v-model="site.active"
                                                    style="width:2.5em; height:1.25em;">
                                            </div>
                                        </td>
                                        <td><input type="text" v-model="site.key"
                                                class="form-control site-input"></td>
                                        <td><input type="text" v-model="site.name"
                                                class="form-control site-input fw-bold"></td>
                                        <td><input type="text" v-model="site.api"
                                                class="form-control site-input text-muted"></td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-light text-danger btn-sm rounded-circle p-2 px-3"
                                                @click="removeSite(index)"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    isLoggedIn: false,
                    password: '',
                    activeMenu: 'sys',
                    config: {},
                    sites: [],
                    hasUnsavedChanges: false,
                    originalConfig: null,
                    originalSites: null
                }
            },
            computed: {
                hasUnsavedConfigChanges() {
                    if (!this.originalConfig) return false;
                    return JSON.stringify(this.config) !== JSON.stringify(this.originalConfig);
                }
            },
            watch: {
                sites: {
                    handler() { this.checkChanges(); },
                    deep: true
                },
                config: {
                    handler() { this.checkChanges(); },
                    deep: true
                }
            },
            methods: {
                showToast(message, type = 'info') {
                    const container = document.getElementById('toastContainer');
                    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-circle' };
                    const toast = document.createElement('div');
                    toast.className = 'toast-item';
                    toast.innerHTML = `<i class="fas ${icons[type]} toast-${type}"></i><span>${message}</span>`;
                    container.appendChild(toast);
                    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
                },
                checkChanges() {
                    if (this.originalConfig && JSON.stringify(this.config) !== JSON.stringify(this.originalConfig)) {
                        this.hasUnsavedChanges = true;
                        return;
                    }
                    if (this.originalSites && JSON.stringify(this.sites) !== JSON.stringify(this.originalSites)) {
                        this.hasUnsavedChanges = true;
                        return;
                    }
                    this.hasUnsavedChanges = false;
                },
                handleLogout() {
                    if (this.hasUnsavedChanges) {
                        if (!confirm('有未保存的更改，确定要退出吗？')) return;
                    }
                    this.isLoggedIn = false;
                    this.hasUnsavedChanges = false;
                },
                async login() {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: this.password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.isLoggedIn = true;
                        this.fetchSites();
                    } else {
                        this.showToast('密码错误！', 'error');
                    }
                },
                async fetchSites() {
                    const res = await fetch('/api/admin/sites');
                    this.sites = await res.json();
                    const resConf = await fetch('/api/admin/config');
                    this.config = await resConf.json();
                    this.originalConfig = JSON.parse(JSON.stringify(this.config));
                    this.originalSites = JSON.parse(JSON.stringify(this.sites));
                    this.hasUnsavedChanges = false;
                },
                async saveConfig() {
                    await fetch('/api/admin/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ config: this.config })
                    });
                    this.originalConfig = JSON.parse(JSON.stringify(this.config));
                    this.hasUnsavedChanges = false;
                    this.showToast('配置保存成功', 'success');
                },
                async saveSites() {
                    await fetch('/api/admin/sites', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sites: this.sites })
                    });
                    this.originalSites = JSON.parse(JSON.stringify(this.sites));
                    this.hasUnsavedChanges = false;
                    this.showToast('站点保存成功', 'success');
                },
                addSite() {
                    this.sites.unshift({ key: 'new_site', name: '新接口', api: '', active: true });
                },
                removeSite(index) {
                    if (confirm('确定删除吗？')) this.sites.splice(index, 1);
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
