<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">

    <title>西葫芦 TV - 影视聚合</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.1.5/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/artplayer/5.1.1/artplayer.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.47/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/4.1.6/vue-router.global.prod.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">
        <!-- Toast 通知 -->
        <div id="toast-container" style="position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>

        <!-- 顶部横向常规导航 -->
        <nav class="navbar-top">
            <div class="brand" @click="goTo('/')">
                <i class="fas fa-play-circle"></i> 西葫芦TV
            </div>

            <!-- PC端输入框 -->
            <div class="nav-search">
                <input type="text" v-model="globalKeyword" @keyup.enter="execSearch" placeholder="搜索电影、电视剧、动漫...">
                <button @click="execSearch"><i class="fas fa-search"></i></button>
            </div>

            <div class="nav-right">
                <a href="/admin.html" target="_blank" class="nav-link"><i class="fas fa-cog"></i> 管理</a>
                <button id="darkModeToggle" style="background:transparent;border:none;color:#555;padding:5px 10px;cursor:pointer;"><i class="fas fa-moon"></i></button>
            </div>
        </nav>

        <!-- 移动端独立搜索框 -->
        <div class="mobile-search-bar" v-if="isMobile">
            <input type="text" v-model="globalKeyword" @keyup.enter="execSearch" placeholder="在此输入关键字进行搜索...">
        </div>

        <!-- 主页面切换 -->
        <main class="main-wrapper">
            <router-view v-slot="{ Component }">
                <transition name="fade" mode="out-in">
                    <!-- KeepAlive 保证流畅度的强体验依然保留 -->
                    <keep-alive include="Home">
                        <component :is="Component" />
                    </keep-alive>
                </transition>
            </router-view>
        </main>
        <!-- 返回顶部按钮 -->
        <transition name="fade">
            <button v-if="showBackToTop" @click="scrollToTop" id="backToTopBtn"
                style="position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 2px 12px rgba(0,161,214,0.4);cursor:pointer;z-index:1000;display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-arrow-up"></i>
            </button>
        </transition>
    </div>

    <!-- ========================= -->
    <!-- 1. Home 首页组件模板 -->
    <!-- ========================= -->
    <template id="tmpl-home">
        <div class="page-home" style="padding-top:20px;">
            <div v-if="!hasSites" class="empty-state" style="margin-top: 80px; padding: 40px; text-align: center;">
                <i class="fas fa-satellite-dish" style="font-size: 60px; margin-bottom: 20px; color: var(--text-sub);"></i>
                <h3 style="margin-bottom: 15px; font-weight: bold; color: var(--text-main);">数据设置未就绪</h3>
                <p style="color: var(--text-sub); font-size: 15px;">当前数据库中未激活任何资源节点。<br>请前往 <a href="/admin.html" target="_blank"
                        style="color:var(--accent); font-weight:bold; text-decoration:none;">管理后台</a> 设置影视源及 TMDB APIKey
                    后刷新生效。</p>
            </div>

            <div v-else v-for="section in rowSections" :key="section.id" v-show="section.list.length > 0"
                style="margin-bottom: 30px;">
                <div class="section-header">
                    <h2 class="section-title"><i :class="section.icon"></i> {{ section.title }}</h2>
                    <div class="btn-more" @click="goMore(section.id, section.title)">查看更多 <i
                            class="fas fa-angle-right"></i></div>
                </div>
                <div class="card-row" :id="section.id">
                    <div class="video-card" v-for="item in section.list.slice(0, 8)" :key="item.id"
                        @click="playNow(item.title || item.name)">
                        <div class="video-cover">
                            <img :src="getCover(item.poster_path)" loading="lazy">
                            <div v-if="item.vote_average > 0" class="rating-tag">{{ item.vote_average.toFixed(1) }}</div>
                        </div>
                        <div class="video-name">{{ item.title || item.name }}</div>
                        <div class="video-text">{{ (item.release_date || item.first_air_date || '').split('-')[0] }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ========================= -->
    <!-- 2. Search 搜索页模板 -->
    <!-- ========================= -->
    <template id="tmpl-search">
        <div class="page-search">
            <div class="section-header">
                <h2 class="section-title" style="margin-bottom: 20px;">包含 <span
                        style="color:var(--accent); margin:0 8px;">"{{ searchWord }}"</span> 的搜索结果</h2>
            </div>

            <!-- 骨架屏加载 -->
            <div v-if="loading" class="result-grid">
                <div v-for="i in 18" :key="'sk'+i">
                    <div class="skeleton-card"></div>
                    <div style="height:14px; width:70%; background:var(--skeleton-bg); margin-top:10px; border-radius:2px;"></div>
                </div>
            </div>

            <!-- 结果列表 -->
            <div v-else-if="groupedList.length > 0" class="result-grid">
                <div class="video-card" v-for="group in groupedList" :key="group.name" @click="viewDetail(group)"
                    style="width:100%;">
                    <div class="video-cover">
                        <img v-if="!isFallback(group.name)" :src="getPoster(group)" @error="handleImgError(group.name)"
                            loading="lazy" referrerpolicy="no-referrer">
                        <div v-else
                            style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--cover-bg); color:var(--text-sub);">
                            <i class="fas fa-film" style="font-size:32px;margin-bottom:8px;"></i>
                            <span style="font-size:12px;">暂无封面</span>
                        </div>
                        <div class="node-tag">{{ group.sources.length }} 个节点</div>
                    </div>
                    <div class="video-name">{{ group.name }}</div>
                    <div class="video-text">点击产出高清源</div>
                </div>
            </div>

            <div v-else class="empty-state">
                <i class="fas fa-box-open" style="font-size: 40px; margin-bottom: 15px; color: var(--text-sub);"></i>
                <h3>未找到相关内容</h3>
                <p>没有找到 "{{ searchWord }}" 相关的数据，请换个词试试。</p>
            </div>
        </div>
    </template>

    <!-- ========================= -->
    <!-- 2.5 Category 分类与更多模板 -->
    <!-- ========================= -->
    <template id="tmpl-category">
        <div class="page-category">
            <div class="section-header">
                <h2 class="section-title" style="margin-bottom: 20px;"><i class="fas fa-layer-group"></i> {{
                    categoryName }}</h2>
            </div>

            <!-- 骨架屏加载 -->
            <div v-if="loading" class="result-grid">
                <div v-for="i in 18" :key="'sk'+i">
                    <div class="skeleton-card"></div>
                    <div style="height:14px; width:70%; background:var(--skeleton-bg); margin-top:10px; border-radius:2px;"></div>
                </div>
            </div>

            <!-- 结果列表 -->
            <div v-else-if="list.length > 0" class="result-grid">
                <div class="video-card" v-for="item in list" :key="item.id" @click="playNow(item.title || item.name)"
                    style="width:100%;">
                    <div class="video-cover">
                        <img :src="getCover(item.poster_path)" loading="lazy">
                        <div v-if="item.vote_average > 0" class="rating-tag">{{ item.vote_average.toFixed(1) }}</div>
                    </div>
                    <div class="video-name">{{ item.title || item.name }}</div>
                    <div class="video-text">{{ (item.release_date || item.first_air_date || '').split('-')[0] }}</div>
                </div>
            </div>

            <!-- 分页器 -->
            <div class="pagination-area" v-if="list.length > 0 && totalPages > 1">
                <button class="btn-page" :disabled="page <= 1" @click="changePage(page - 1)"><i
                        class="fas fa-angle-left"></i> 上一页</button>
                <span class="page-info">第 {{ page }} / {{ totalPages }} 页</span>
                <button class="btn-page" :disabled="page >= totalPages" @click="changePage(page + 1)">下一页 <i
                        class="fas fa-angle-right"></i></button>
            </div>
        </div>
    </template>

    <!-- ========================= -->
    <!-- 3. Detail 播放页模板 -->
    <!-- ========================= -->
    <template id="tmpl-detail">
        <div class="page-detail">
            <div class="detail-box">
                <!-- 头部信息 -->
                <div class="d-header">
                    <div style="color:var(--text-sub); cursor:pointer; font-size:14px; margin-bottom:15px; display:inline-block;"
                        @click="$router.back()">
                        <i class="fas fa-chevron-left"></i> 返回上一页
                    </div>
                    <h1 class="d-title">{{ groupName }}</h1>
                    <div class="d-meta">
                        正在连接: <span style="color:var(--accent); font-weight:bold; margin-left:4px;">{{
                            currentSource?.site_name || '分配中...' }}</span>
                    </div>
                </div>

                <!-- 主播放器 -->
                <div class="player-wrapper">
                    <div id="dplayer"></div>
                </div>

                <!-- 节点切换区 -->
                <div style="margin-bottom: 30px;">
                    <div class="panel-sub-title"><i class="fas fa-server"></i> 节点选择</div>
                    <div class="source-list">
                        <div v-for="source in groupSources" :key="source.site_key" class="source-tag"
                            :class="{ active: currentSource?.site_key === source.site_key }"
                            @click="switchSource(source)">
                            <span v-if="source.loading" class="spinner-border spinner-border-sm" style="width:12px;height:12px;border-width:2px;"></span>
                            <template v-else>
                                {{ source.site_name }}
                                <span class="dot" :class="getLatencyClass(source.latency)"></span>
                                <span style="font-size:12px; opacity:0.8;">{{ source.latency === 9999 ? '超时' : (source.latency ? source.latency+'ms' : '...') }}</span>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- 选集区 -->
                <div>
                    <div class="panel-sub-title"><i class="fas fa-list-ul"></i> 节目选集</div>
                    <div v-if="loadingDetail" style="padding: 40px; text-align:center; color:var(--text-sub);">
                        <div class="spinner-border text-primary" role="status" style="width:30px;height:30px;border-width:3px;margin:0 auto;"></div>
                        <div style="margin-top:12px;">正在获取分集列表...</div>
                    </div>
                    <div v-else class="ep-list">
                        <div v-for="ep in episodeList" :key="ep.url" class="ep-item"
                            :class="{ active: currentUrl === ep.url }" @click="play(ep.url)">
                            {{ ep.name }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        const { createApp, reactive, ref, onMounted, nextTick, computed, onUnmounted, watch } = Vue;
        const { createRouter, createWebHashHistory, useRouter, useRoute } = VueRouter;

        // Toast 通知系统
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-circle' };
            const colors = { success: '#67c23a', error: '#f56c6c', info: '#909399', warning: '#e6a23c' };
            toast.style.cssText = `display:flex;align-items:center;gap:10px;padding:12px 20px;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-size:14px;max-width:300px;animation:slideIn 0.3s ease;`;
            toast.innerHTML = `<i class="fas ${icons[type]}" style="color:${colors[type]};font-size:18px;"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, duration);
        }
        if (!document.getElementById('toast-animations')) {
            const style = document.createElement('style');
            style.id = 'toast-animations';
            style.textContent = `@keyframes slideIn { from { opacity:0; transform:translateX(100%); } to { opacity:1; transform:translateX(0); } }`;
            document.head.appendChild(style);
        }

        // Dark mode
        function initDarkMode() {
            const saved = localStorage.getItem('darkMode');
            const isDark = saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            applyDarkMode(isDark);
        }
        function applyDarkMode(isDark) {
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('darkMode', isDark);
            const btn = document.getElementById('darkModeToggle');
            if (btn) btn.innerHTML = `<i class="fas fa-${isDark ? 'sun' : 'moon'}"></i>`;
        }

        // 获取后动态分配的配置
        let MY_PROXY = "";
        let TMDB_BASE_URL = "";
        let TMDB_IMG_URL = "";
        let TMDB_API_KEY = "";
        let TMDB_BACKDROP_URL = "";

        // 沿用此前的持久化与性能逻辑
        const createPersistedState = () => {
            const initialState = {
                heroList: [], movieList: [], tvList: [], list_cn: [], list_krjp: [],
                imageMap: {}, fallbackMap: {}
            };
            try {
                const cached = localStorage.getItem('vue_classic_store');
                if (cached) return { ...initialState, ...JSON.parse(cached) };
            } catch (e) { }
            return initialState;
        };

        const store = reactive({
            ...createPersistedState(),
            rawSearchResults: [],
            searchLoading: false,
            hasSites: true
        });

        watch(
            () => [store.heroList, store.movieList, store.list_cn, store.imageMap],
            () => {
                const dataToSave = {
                    movieList: store.movieList, tvList: store.tvList,
                    list_cn: store.list_cn, list_krjp: store.list_krjp,
                    imageMap: store.imageMap, fallbackMap: store.fallbackMap
                };
                localStorage.setItem('vue_classic_store', JSON.stringify(dataToSave));
            },
            { deep: true }
        );

        function computeGroupedList(rawList) {
            const groups = {};
            rawList.forEach(item => {
                const name = item.vod_name;
                if (!groups[name]) groups[name] = { name: name, pic: item.vod_pic, sources: [] };
                const isDefault = (url) => !url || url.includes('mac_default') || url.includes('nopic');
                if (isDefault(groups[name].pic) && !isDefault(item.vod_pic)) groups[name].pic = item.vod_pic;
                if (isDefault(groups[name].pic)) handleImgError(name);
                groups[name].sources.push({ ...item, latency: item.latency || 9999 });
            });
            return Object.values(groups).sort((a, b) => b.sources.length - a.sources.length);
        }

        function handleImgError(name) {
            if (store.imageMap[name] || store.fallbackMap[name]) return;
            store.fallbackMap[name] = true;
            let cleanName = name.replace(/第[0-9一二三四五六七八九十]+[季部]/g, '').replace(/Season\s*\d+/ig, '').replace(/S\d{1,2}/ig, '').replace(/(HD|BD|1080P|720P|4K|202\d|TC|TS).*/i, '').trim();
            fetch(`${TMDB_BASE_URL}/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(cleanName)}&language=zh-CN`)
                .then(res => res.json()).then(data => {
                    if (data.results && data.results.length > 0) {
                        const found = data.results.find(i => i.poster_path) || data.results[0];
                        if (found.poster_path) {
                            store.imageMap[name] = `${TMDB_IMG_URL}${found.poster_path}`;
                            store.fallbackMap[name] = false;
                        }
                    }
                }).catch(() => { });
        }

        function setupTouchScroll(rowEl) {
            if (!rowEl) return;
            let isDown = false, startX, scrollLeft, startY, isScrolling = false;
            const endGrab = () => { isDown = false; rowEl.style.cursor = 'grab'; rowEl.style.scrollSnapType = 'x mandatory'; };
            rowEl.addEventListener('mousedown', (e) => {
                isDown = true; startX = e.pageX - rowEl.offsetLeft; scrollLeft = rowEl.scrollLeft;
                rowEl.style.cursor = 'grabbing'; rowEl.style.scrollSnapType = 'none';
            });
            rowEl.addEventListener('mouseleave', endGrab); rowEl.addEventListener('mouseup', endGrab);
            rowEl.addEventListener('mousemove', (e) => {
                if (!isDown) return; e.preventDefault();
                rowEl.scrollLeft = scrollLeft - ((e.pageX - rowEl.offsetLeft) - startX) * 2;
            });

            rowEl.addEventListener('touchstart', (e) => {
                isDown = true; isScrolling = false;
                startX = e.touches[0].pageX - rowEl.offsetLeft; startY = e.touches[0].pageY;
                scrollLeft = rowEl.scrollLeft; rowEl.style.scrollSnapType = 'none';
            }, { passive: true });
            rowEl.addEventListener('touchmove', (e) => {
                if (!isDown) return;
                const currentX = e.touches[0].pageX; const currentY = e.touches[0].pageY;
                if (Math.abs(currentY - startY) > Math.abs(currentX - startX)) { isScrolling = true; return; }
                if (isScrolling) return;
                rowEl.scrollLeft = scrollLeft - ((currentX - rowEl.offsetLeft) - startX) * 2;
            }, { passive: true });
            rowEl.addEventListener('touchend', endGrab);
            rowEl.style.cursor = 'grab';
        }

        const getCover = (path) => path ? `${MY_PROXY}/t/p/w300${path}` : '';


        /* Component: Home */
        const Home = {
            name: 'Home',
            template: '#tmpl-home',
            setup() {
                const router = useRouter();
                // 修正文案为符合中文阅读的本土化名称
                const rowSections = computed(() => [
                    { id: 'movie', title: '热门电影', icon: 'fas fa-film', list: store.movieList },
                    { id: 'tv', title: '热播剧集', icon: 'fas fa-tv', list: store.tvList },
                    { id: 'krjp', title: '动漫与日韩剧', icon: 'fas fa-mask', list: store.list_krjp },
                    { id: 'cn', title: '国产佳作', icon: 'fas fa-dragon', list: store.list_cn }
                ]);
                const bgFetch = () => {
                    fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_API_KEY}&language=zh-CN`)
                        .then(r => r.json()).then(d => { if (d.results) store.movieList = d.results; });
                    fetch(`${TMDB_BASE_URL}/trending/tv/week?api_key=${TMDB_API_KEY}&language=zh-CN`)
                        .then(r => r.json()).then(d => { if (d.results) store.tvList = d.results; });
                    fetch(`${TMDB_BASE_URL}/discover/tv?with_origin_country=KR|JP&sort_by=popularity.desc&api_key=${TMDB_API_KEY}&language=zh-CN`)
                        .then(r => r.json()).then(d => { if (d.results) store.list_krjp = d.results; });
                    fetch(`${TMDB_BASE_URL}/discover/tv?with_origin_country=CN&sort_by=popularity.desc&api_key=${TMDB_API_KEY}&language=zh-CN`)
                        .then(r => r.json()).then(d => { if (d.results) store.list_cn = d.results; });
                };

                onMounted(() => {
                    bgFetch();
                    nextTick(() => { rowSections.value.forEach(s => setupTouchScroll(document.getElementById(s.id))); });
                });

                return { rowSections, playNow: (name) => router.push({ path: '/search', query: { wd: name } }), goMore: (id, name) => router.push({ path: '/category', query: { id, name } }), getCover, hasSites: computed(() => store.hasSites) };
            }
        };

        /* Component: Category */
        const Category = {
            name: 'Category',
            template: '#tmpl-category',
            setup() {
                const route = useRoute();
                const router = useRouter();
                const categoryId = computed(() => route.query.id);
                const categoryName = computed(() => route.query.name || '分类数据');
                const page = ref(parseInt(route.query.page) || 1);
                const list = ref([]);
                const loading = ref(true);
                const totalPages = ref(1);

                const fetchList = () => {
                    loading.value = true;
                    list.value = [];
                    let url = '';
                    const p = page.value;
                    if (categoryId.value === 'movie') url = `${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_API_KEY}&language=zh-CN&page=${p}`;
                    else if (categoryId.value === 'tv') url = `${TMDB_BASE_URL}/trending/tv/week?api_key=${TMDB_API_KEY}&language=zh-CN&page=${p}`;
                    else if (categoryId.value === 'krjp') url = `${TMDB_BASE_URL}/discover/tv?with_origin_country=KR|JP&sort_by=popularity.desc&api_key=${TMDB_API_KEY}&language=zh-CN&page=${p}`;
                    else if (categoryId.value === 'cn') url = `${TMDB_BASE_URL}/discover/tv?with_origin_country=CN&sort_by=popularity.desc&api_key=${TMDB_API_KEY}&language=zh-CN&page=${p}`;

                    if (url) {
                        fetch(url).then(r => r.json()).then(d => {
                            if (d.results) { list.value = d.results; totalPages.value = Math.min(d.total_pages, 500); }
                            loading.value = false;
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }).catch(() => loading.value = false);
                    } else { loading.value = false; }
                };

                onMounted(() => fetchList());
                watch(() => [route.query.id, route.query.page], () => {
                    if (route.name === 'Category') {
                        page.value = parseInt(route.query.page) || 1;
                        fetchList();
                    }
                });

                const changePage = (p) => { router.push({ path: '/category', query: { id: categoryId.value, name: categoryName.value, page: p } }); };

                return { categoryName, list, loading, page, totalPages, changePage, playNow: (name) => router.push({ path: '/search', query: { wd: name } }), getCover };
            }
        };

        /* Component: Search */
        const Search = {
            name: 'Search',
            template: '#tmpl-search',
            setup() {
                const route = useRoute();
                const router = useRouter();
                const searchWord = computed(() => route.query.wd || '');
                const loading = computed(() => store.searchLoading);
                const groupedList = computed(() => computeGroupedList(store.rawSearchResults));

                const performSearch = async (wd) => {
                    if (!wd) return router.push('/');
                    store.searchLoading = true;
                    store.rawSearchResults = [];
                    try {
                        const res = await fetch(`/api/search?wd=${encodeURIComponent(wd)}`);
                        const data = await res.json();
                        store.rawSearchResults = data.list || [];
                        store.rawSearchResults.forEach(item => {
                            if (!item.vod_pic || item.vod_pic.includes('mac_default')) handleImgError(item.vod_name);
                        });
                    } catch (e) { }
                    store.searchLoading = false;
                };

                onMounted(() => performSearch(searchWord.value));
                watch(() => route.query.wd, (newWd) => { if (route.name === 'Search') performSearch(newWd); });

                return { searchWord, loading, groupedList, handleImgError, isFallback: (n) => store.fallbackMap[n], getPoster: (g) => store.imageMap[g.name] || g.pic, viewDetail: (g) => router.push({ path: '/detail', query: { name: g.name } }) };
            }
        };

        /* Component: Detail */
        const Detail = {
            name: 'Detail',
            template: '#tmpl-detail',
            setup() {
                const route = useRoute();
                const router = useRouter();
                const groupName = ref(route.query.name || '');
                const groupSources = ref([]);
                const currentSource = ref(null);
                const episodeList = ref([]);
                const currentUrl = ref('');
                const loadingDetail = ref(true);
                let art = null;

                // ...省略无关代码保持...

                const initDetailLoad = async () => {
                    let g = (store.rawSearchResults && store.rawSearchResults.length > 0) ? computeGroupedList(store.rawSearchResults).find(x => x.name === groupName.value) : null;
                    if (!g) {
                        try {
                            const res = await fetch(`/api/search?wd=${encodeURIComponent(groupName.value)}`);
                            const data = await res.json();
                            let freshGroups = computeGroupedList(data.list || []);
                            g = freshGroups.find(x => x.name === groupName.value) || freshGroups[0];
                        } catch (e) { }
                    }
                    if (!g) return router.push('/');
                    groupSources.value = g.sources;

                    groupSources.value.forEach(src => {
                        fetch(`/api/check?key=${src.site_key}`)
                            .then(res => res.json()).then(data => { src.latency = data.latency; });
                    });
                    if (groupSources.value.length > 0) switchSource(groupSources.value[0]);
                };

                onMounted(() => initDetailLoad());
                onUnmounted(() => { if (art) art.destroy(); }); // Destroy player

                const switchSource = async (source) => {
                    if (source.loading) return;
                    source.loading = true;
                    currentSource.value = source;
                    loadingDetail.value = true;
                    episodeList.value = [];
                    try {
                        const res = await fetch(`/api/detail?site_key=${source.site_key}&id=${source.vod_id}`);
                        const data = await res.json();
                        if (data.list && data.list.length > 0) parseEpisodes(data.list[0].vod_play_url);
                    } catch (e) { showToast("获取分集列表失败", "error"); }
                    source.loading = false;
                    loadingDetail.value = false;
                };

                const parseEpisodes = (urlStr) => {
                    let playSource = urlStr;
                    if (urlStr.includes('$$$')) playSource = urlStr.split('$$$').find(s => s.toLowerCase().includes('m3u8')) || urlStr.split('$$$')[0];
                    episodeList.value = playSource.split('#').map(ep => {
                        const p = ep.split('$'); return { name: p.length > 1 ? p[0] : '正片', url: p.length > 1 ? p[1] : p[0] };
                    });
                    if (episodeList.value.length > 0) play(episodeList.value[0].url);
                };

                const play = (url) => {
                    currentUrl.value = url;
                    nextTick(() => {
                        const container = document.getElementById('dplayer');
                        if (!container) return;

                        if (art) {
                            art.switchUrl(url);
                            art.play();
                        } else {
                            art = new Artplayer({
                                container: container,
                                url: url,
                                type: 'm3u8',
                                customType: {
                                    m3u8: function (video, url, art) {
                                        if (Hls.isSupported()) {
                                            if (art.hls) art.hls.destroy();
                                            const hls = new Hls();
                                            hls.loadSource(url);
                                            hls.attachMedia(video);
                                            art.hls = hls;
                                            art.on('destroy', () => hls.destroy());
                                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                            video.src = url;
                                        } else {
                                            art.notice.show = '当前浏览器不支持播放该格式';
                                        }
                                    }
                                },
                                theme: '#00a1d6',
                                autoplay: true,
                                pip: true, // 画中画支持
                                airplay: true, // Airplay 支持 (iOS Safari原生直接支持)
                                fullscreen: true,
                                fullscreenWeb: true,
                                playbackRate: true,
                                setting: true,
                                playsInline: true,
                                controls: [
                                    {
                                        position: 'right',
                                        html: '<i class="fas fa-tv" style="font-size:16px;"></i>',
                                        tooltip: '设备投屏',
                                        style: { marginLeft: '10px' },
                                        click: function () {
                                            if (window.WebKitPlaybackTargetAvailabilityEvent) {
                                                art.video.webkitShowPlaybackTargetPicker();
                                            } else {
                                                showToast("部分设备不支持纯网页投屏，建议使用浏览器自带投屏功能", "warning");
                                            }
                                        }
                                    }
                                ]
                            });
                        }
                    });
                };

                const getLatencyClass = (l) => {
                    if (l === 9999 || l == null) return 'red';
                    return l < 500 ? 'green' : (l < 2000 ? 'yellow' : 'red');
                };

                return { groupName, groupSources, currentSource, loadingDetail, episodeList, currentUrl, switchSource, play, getLatencyClass };
            }
        };

        const routes = [
            { path: '/', name: 'Home', component: Home },
            { path: '/category', name: 'Category', component: Category },
            { path: '/search', name: 'Search', component: Search },
            { path: '/detail', name: 'Detail', component: Detail }
        ];

        const router = createRouter({
            history: createWebHashHistory(), routes,
            scrollBehavior(to, from, savedPosition) { return savedPosition || { left: 0, top: 0 }; }
        });

        const App = {
            setup() {
                const r = useRouter();
                const globalKeyword = ref('');
                const isMobile = ref(false);
                const showBackToTop = ref(false);

                onMounted(() => {
                    isMobile.value = window.innerWidth <= 768;
                    window.addEventListener('resize', () => isMobile.value = window.innerWidth <= 768);
                    initDarkMode();
                    document.getElementById('darkModeToggle').addEventListener('click', () => {
                        const isDark = localStorage.getItem('darkMode') === 'true';
                        applyDarkMode(!isDark);
                    });
                    window.addEventListener('scroll', () => {
                        showBackToTop.value = window.scrollY > 400;
                    }, { passive: true });
                });

                const execSearch = () => {
                    if (globalKeyword.value.trim()) {
                        r.push({ path: '/search', query: { wd: globalKeyword.value } });
                    }
                };

                const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

                return { globalKeyword, execSearch, goTo: (p) => r.push(p), isMobile, showBackToTop, scrollToTop };
            }
        };

        // 启动系统，先获取关键环境配置
        fetch('/api/config').then(res => res.json()).then(conf => {
            store.hasSites = !!conf.hasSites;
            MY_PROXY = conf.tmdb_proxy || "https://api.tmdb.org";
            TMDB_API_KEY = conf.tmdb_api_key || "";
            TMDB_BASE_URL = `${MY_PROXY}/3`;
            TMDB_IMG_URL = `${MY_PROXY}/t/p/w500`;
            TMDB_BACKDROP_URL = `${MY_PROXY}/t/p/original`;

            // 当配置拉取完毕后挂载视图层以防数据加载空转
            createApp(App).use(router).mount('#app');
        }).catch(e => {
            showToast("无法获取后端配置，请检查服务端状态!", "error", 5000);
        });
    </script>
</body>

</html>
